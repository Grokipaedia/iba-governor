# .iba.yaml - IBA Intent Bound Authorization Configuration
# Patent GB2603013.0 (Pending) · intentbound.com

intent:
  description: "Research and document AI governance developments. No deployment, no payments, no external APIs."

scope:
  - research
  - analysis
  - coding
  - documentation

denied:
  - production-deployment
  - financial-transactions
  - data-deletion
  - external-api-calls
  - secret

default_posture: "DENY_ALL"

kill_threshold: "production-deployment | financial-transactions | data-deletion"

temporal_scope:
  hard_expiry: "2026-12-31"

entropy_threshold:
  max_kl_divergence: 0.12
  flag_at: 0.08
  kill_at: 0.12
  replan_window_ms: 500

team_mode:
  require_human_review_for:
    - high-risk-actions
  audit_level: "full"
